<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mac Store</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            padding: 40px;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 1300px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 42px;
            margin-bottom: 35px;
        }

        .form-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .3);
            margin-bottom: 45px;
        }

        .form-box input {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: none;
            background: #eef2f7;
            border-radius: 12px;
            font-size: 16px;
        }

        .form-box input:focus {
            outline: none;
            border: 2px solid royalblue;
        }

        .form-box button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #2563eb, #06b6d4);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: .3s;
        }

        .form-box button:hover {
            transform: scale(1.02);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .25);
            transition: .4s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }

        .info {
            padding: 20px;
        }

        .info h2 {
            margin-bottom: 10px;
        }

        .price {
            color: #16a34a;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
        }

        .buttons a {
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
        }

        .edit {
            background: #2563eb;
        }

        .delete {
            background: #dc2626;
        }

        .empty {
            color: white;
            text-align: center;
            font-size: 25px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>🍏 Apple MAC Store</h1>

        <div class="form-box">

            <form method="POST">
                {% csrf_token %}

                <input type="text" name="nimi" placeholder="Mac nomi" required>

                <input type="number" step="0.01" name="narxi" placeholder="Narxi" required>

                <input type="url" name="image_url" placeholder="Image URL" required>

                <button>➕ Qo'shish</button>

            </form>

        </div>

        <div class="cards">

            {% for mac in macs %}

            <div class="card">

                <img src="{{mac.image_url}}">

                <div class="info">

                    <h2>{{mac.nimi}}</h2>

                    <div class="price">
                        ${{mac.narxi}}
                    </div>

                    <div class="buttons">

                        <a href="{% url 'update' mac.id %}" class="edit">
                            ✏ Update
                        </a>

                        <a href="{% url 'delete' mac.id %}" class="delete">
                            🗑 Delete
                        </a>

                    </div>

                </div>

            </div>

            {% empty %}

            <div class="empty">
                MacBooklar mavjud emas.
            </div>

            {% endfor %}

        </div>

    </div>

</body>

</html>
