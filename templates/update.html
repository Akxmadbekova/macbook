<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Mac</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e3a8a, #2563eb, #0ea5e9);
        }

        .box {

            width: 450px;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .3);

        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        input {

            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: none;
            background: #edf2f7;
            border-radius: 10px;
            font-size: 16px;

        }

        input:focus {
            outline: none;
            border: 2px solid royalblue;
        }

        button {

            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            background: linear-gradient(45deg, #2563eb, #06b6d4);
            color: white;
            cursor: pointer;
            margin-top: 15px;

        }

        button:hover {
            opacity: .9;
        }

        a {

            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            font-size: 18px;
            color: #2563eb;

        }
    </style>

</head>

<body>

    <div class="box">

        <h1>✏ Update Mac</h1>

        <form method="POST">

            {% csrf_token %}

            <input type="text" name="nimi" value="{{mac.nimi}}" required>

            <input type="number" step="0.01" name="narxi" value="{{mac.narxi}}" required>

            <input type="url" name="image_url" value="{{mac.image_url}}" required>

            <button>
                💾 Saqlash
            </button>

        </form>

        <a href="{% url 'index' %}">
            ⬅ Orqaga
        </a>

    </div>

</body>

</html>
