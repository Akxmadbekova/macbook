<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Tahrirlash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #090d16, #111827, #1f2937);
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .update-box {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 550px;
        }

        h2 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #9ca3af;
            padding-left: 4px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(17, 24, 39, 0.6);
            border-radius: 14px;
            font-size: 16px;
            color: white;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .btn-save {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.2);
            margin-top: 10px;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #34d399, #10b981);
        }

        .btn-cancel {
            display: block;
            text-align: center;
            text-decoration: none;
            color: #9ca3af;
            margin-top: 15px;
            font-size: 14px;
            transition: color 0.2s;
        }

        .btn-cancel:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="update-box">
        <h2>✏ iPhone Ma'lumotlarini Tahrirlash</h2>
        
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>iPhone Modeli</label>
                <input type="text" name="nomi" value="{{ phone.nomi }}" required>
            </div>

            <div class="form-group">
                <label>Narxi ($)</label>
                <input type="number" step="0.01" name="narxi" value="{{ phone.narxi }}" required>
            </div>

            <div class="form-group">
                <label>Rasm URL Manzili</label>
                <input type="url" name="image_url" value="{{ phone.image_url }}" required>
            </div>

            <button type="submit" class="btn-save">💾 O'zgarishlarni Saqlash</button>
            <a href="{% url 'iphone_store' %}" class="btn-cancel">Bekor qilish</a>
        </form>
    </div>

</body>
</html>
